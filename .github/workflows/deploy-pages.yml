name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JavaScript bundles
        shell: pwsh
        run: |
          .\bin\esbuild.exe bundle=./src/scripts/index.js pd=./src/scripts/pages/pd.js --bundle --outdir=static/scripts --alias:@root=./src/scripts --alias:@config=./src/scripts/config --alias:@pages=./src/scripts/pages --alias:@components=./src/scripts/components --alias:@layout=./src/scripts/layout --alias:@library=./src/scripts/library --alias:@utils=./src/scripts/utils --alias:@vendors=./src/scripts/vendors

      - name: Prepare Pages artifact
        shell: pwsh
        run: |
          New-Item -Path pages-dist -ItemType Directory -Force | Out-Null
          Copy-Item -Path static -Destination pages-dist -Recurse -Force
          if (Test-Path _dev) {
            Copy-Item -Path _dev -Destination pages-dist -Recurse -Force
          }
          if (Test-Path guide) {
            Copy-Item -Path guide -Destination pages-dist -Recurse -Force
          }
          if (Test-Path images) {
            Copy-Item -Path images -Destination pages-dist -Recurse -Force
          }

      - name: Rewrite absolute asset paths for Pages base path
        shell: pwsh
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          $basePath = "/$env:REPO_NAME/"
          if ($env:REPO_NAME -eq "$env:REPO_OWNER.github.io") {
            $basePath = "/"
          }

          $htmlFiles = Get-ChildItem -Path pages-dist -Recurse -File -Include *.html
          foreach ($file in $htmlFiles) {
            $content = Get-Content -Path $file.FullName -Raw
            $content = $content.Replace('href="/static/', ('href="' + $basePath + 'static/'))
            $content = $content.Replace('href="/_dev/', ('href="' + $basePath + '_dev/'))
            $content = $content.Replace('src="/static/', ('src="' + $basePath + 'static/'))
            $content = $content.Replace('src="/_dev/', ('src="' + $basePath + '_dev/'))
            $content = $content.Replace('src="/guide/', ('src="' + $basePath + 'guide/'))
            Set-Content -Path $file.FullName -Value $content -NoNewline
          }

          $cssFiles = Get-ChildItem -Path pages-dist -Recurse -File -Include *.css
          foreach ($file in $cssFiles) {
            $content = Get-Content -Path $file.FullName -Raw
            $content = $content.Replace('url("/static/', ('url("' + $basePath + 'static/'))
            $content = $content.Replace("url('/static/", ("url('" + $basePath + "static/"))
            $content = $content.Replace('url(/static/', ('url(' + $basePath + 'static/'))
            $content = $content.Replace('url(/_dev/', ('url(' + $basePath + '_dev/'))
            Set-Content -Path $file.FullName -Value $content -NoNewline
          }

          $jsFiles = Get-ChildItem -Path pages-dist -Recurse -File -Include *.js
          foreach ($file in $jsFiles) {
            $content = Get-Content -Path $file.FullName -Raw
            $content = $content.Replace('"/static/', ('"' + $basePath + 'static/'))
            $content = $content.Replace('"/_dev/', ('"' + $basePath + '_dev/'))
            $content = $content.Replace("'/static/", ("'" + $basePath + "static/"))
            $content = $content.Replace("'/_dev/", ("'" + $basePath + "_dev/"))
            $content = $content.Replace('`/static/', ('`' + $basePath + 'static/'))
            $content = $content.Replace('`/_dev/', ('`' + $basePath + '_dev/'))
            Set-Content -Path $file.FullName -Value $content -NoNewline
          }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
