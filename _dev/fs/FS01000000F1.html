<!doctype html>
<html lang="ko">
  <head>
    <title>BC카드 가맹점</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="/static/styles/base.css" />
    <link rel="stylesheet" href="/static/styles/common.css" />

    <link rel="preload" href="/static/styles/fs.css" as="style" />
    <link rel="stylesheet" href="/static/styles/fs.css" />

    <script src="/static/scripts/jquery-2.2.3.min.js"></script>
    <script src="/static/scripts/jquery-ui.min.js"></script>
    <script src="/static/scripts/common.ui.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <div id="header"></div>

      <main id="container">
        <div class="page">
          <div class="title">
            <h1 class="_font-headline-1">대출상품 안내/신청</h1>
          </div>
          
          <div class="full visual-wrap merchant-loan-service">
            <div class="visual-item">
              <div class="text-area">
                <span class="bg-text">신용대출</span>
                <h2 class="_font-title-1">BC카드 가맹점대출</h2>
                <p class="text">가맹점 운영에 필요한 자금을 보다 간편하게 이용해보세요.<br>
                  부담은 낮추고, 필요한 순간 빠르게 지원해드립니다.</p>
              </div>
            </div>
          </div>
          <!-- //visual-item -->

          <div class="contents">
            <div class="merchant-loan-guide">
              <div class="guide-item">
                <div class="inner">
                  <div class="text-area">
                    <h3 class="_font-title-2">
                      <span>24시간 365일 쉽고 편리하게 </span>
                      BC카드 가맹점 운영중인 <br>개인사업자만 빌려드려요
                    </h3>
                    <dl class="loan-infor">
                      <dt>대출기간</dt>
                      <dd class="_font-title-4">최대 60개월</dd>
                      <dt>최대한도</dt>
                      <dd class="_font-title-4">5천만원</dd>
                      <dt>대출금리</dt>
                      <dd class="_font-title-4">연 4.9 ~ 19.9%</dd>
                    </dl>
                  </div>
                  <div class="item-wrap">
                    <div class="item">
                      <div class="text-area">
                        <span class="point-text">특징 01</span>
                        <strong class="_font-title-3">대출 서류가 없어 <br>편리하게 이용 가능해요</strong>
                      </div>
                    </div>
                    <div class="item">
                      <div class="text-area">
                        <span class="point-text">특징 02</span>
                        <strong class="_font-title-3">중도상환수수료가 없어 <br>중도상환 부담이 없어요</strong>
                      </div>
                    </div>
                    <div class="item">
                      <div class="text-area">
                        <span class="point-text">특징 03</span>
                        <strong class="_font-title-3">24시간 365일 <br>바로 입금이 가능해요</strong>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- //guide-item -->
            </div>
            <!-- //merchant-loan-guide -->

            <div class="_btn-wrap">
              <button type="button" class="_btn-large-primary">대출한도조회/신청</button>
            </div>
          </div>
          <!-- //contents -->
        </div>
        <!-- //page -->
      </main>
      <!-- //container -->

      <div id="footer"></div>
    </div>

    <script src="/guide/dev/js/include.js"></script>
  </body>
</html>
