<!doctype html>
<html lang="ko">
  <head>
    <title>BC카드 가맹점</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="/static/styles/base.css" />
    <link rel="stylesheet" href="/static/styles/common.css" />

    <link rel="stylesheet" href="/static/styles/ev.css" />

    <script src="/static/scripts/jquery-2.2.3.min.js"></script>
    <script src="/static/scripts/jquery-ui.min.js"></script>
    <script src="/static/scripts/common.ui.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <div id="header"></div>

      <main id="container">
        <div class="page event">
          <div class="title">
            <h1 class="_font-headline-1">이벤트</h1>
          </div>
          <div class="tab-wrapper full">
            <div class="tab-box">
              <ul class="_tabs-main">
                <li><a href="#link">진행중</a></li>
                <li class="is-on"><a href="#link">종료</a></li>
              </ul>
            </div>
          </div>
          <div class="contents">
            <div class="total-area">
              <span class="total">총 <em>3</em>개</span>
            </div>
            <ul class="event-list">
              <li>
                <a href="#" class="event-card">
                  <span class="event-card-thumb">
                    <img src="/static/images/ev/img_tmp_event_01.png" alt="부분 무이자할부 이벤트" />
                    <span class="_font-title-4 event-card-state" aria-hidden="true">종료</span>
                  </span>
                  <span class="event-card-txt">
                    <h3 class="event-card-title">부분 무이자할부 이용 시 최대 12개월 부분 무이자</h3>
                    <span class="event-card-date">2026.02.01 ~ 2026.03.31</span>
                  </span>
                </a>
              </li>
              <li>
                <a href="#" class="event-card">
                  <span class="event-card-thumb">
                    <img src="/static/images/ev/img_tmp_event_02.png" alt="무이자 할부 이벤트" />
                    <span class="_font-title-4 event-card-state" aria-hidden="true">종료</span>
                  </span>
                  <span class="event-card-txt">
                    <h3 class="event-card-title">무이자 대상 업종에서 할부 결제하면 최대 7개월 무이자</h3>
                    <span class="event-card-date">2026.02.01 ~ 2026.03.31</span>
                  </span>
                </a>
              </li>
              <li>
                <a href="#" class="event-card">
                  <span class="event-card-thumb">
                    <img src="/static/images/ev/img_tmp_event_03.png" alt="영세 중소 가맹점 이벤트" />
                    <span class="_font-title-4 event-card-state" aria-hidden="true">종료</span>
                  </span>
                  <span class="event-card-txt">
                    <h3 class="event-card-title">영세 · 중소 가맹점에서 할부 결제하면 최대 3개월 무이자</h3>
                    <span class="event-card-date">2026.02.01 ~ 2026.03.31</span>
                  </span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </main>

      <div id="footer"></div>
    </div>

    <script src="/guide/dev/js/include.js"></script>
  </body>
</html>
